name: Test build
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test-build:
    strategy:
      matrix:
        include:
          - architecture: amd64
            os: ubuntu-24.04
          - architecture: arm64
            os: ubuntu-24.04-arm 
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install snapcraft cli
        run: |
          sudo snap install snapcraft --classic

      - name: Build snap
        run: |
          sudo snapcraft pack --destructive-mode
        env:
          SNAPCRAFT_BUILD_ENVIRONMENT: host
          USE_SYSTEM_FPM: true

      - name: Upload snap
        uses: actions/upload-artifact@v6
        with:
          name: srb2kart-${{ matrix.architecture }}-snap
          path: "*.snap"
  i386-build:
    runs-on: ubuntu-22.04 # for the best compat we have
    steps:
      - uses: actions/checkout@v6

      - name: Patch manifest for core18
        run: |
          # swap core
          sed -i 's/base: core24/base: core18/g' snapcraft.yaml
          
          # swap gnome with older variant
          sed -i 's/extensions: \[ gnome \]/extensions: \[ gnome-3-34 \]/g' snapcraft.yaml
          
          # rename cmake params
          sed -i 's/cmake-parameters:/configflags:/g' snapcraft.yaml
          
          # change arch syntax
          sed -i 's/platforms:/architectures:/g' snapcraft.yaml
      
      - name: Build snap
        run: |
          sudo snap install snapcraft --classic --channel=7.x/stable
          sudo snapcraft --build-for=i386

      - name: Upload snap
        uses: actions/upload-artifact@v6
        with:
          name: srb2kart-i386-snap
          path: "*.snap"
